<!DOCTYPE html>
<html>
<head>
<style>
body {
  margin: 0;
  background: #0a0a0a;
  font-family: 'Courier New', monospace;
}
.banner {
  width: 1280px;
  height: 430px;
  background: linear-gradient(135deg, #1a1a2e 0%, #0a0a0a 50%, #1a1a2e 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
}
.logo {
  font-size: 120px;
  font-weight: bold;
  background: linear-gradient(90deg, #ff6b6b, #ffd93d);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.tagline {
  position: absolute;
  bottom: 60px;
  font-size: 32px;
  color: #888;
}
.token-address {
  position: absolute;
  bottom: 20px;
  font-size: 14px;
  color: #444;
  font-family: monospace;
}
.particles {
  position: absolute;
  width: 100%;
  height: 100%;
}
.particle {
  position: absolute;
  width: 4px;
  height: 4px;
  background: #ff6b6b;
  border-radius: 50%;
  opacity: 0.5;
}
</style>
</head>
<body>
<div class="banner">
  <div class="logo">🎭 $LiEs</div>
  <div class="tagline">Truth Hurts. $LiEs Hurts More.</div>
  <div class="token-address">2n7VjoSSU59psSQEcVNrh6L18j3fVKgr7LyLMwR4pump</div>
</div>
</body>
</html>
